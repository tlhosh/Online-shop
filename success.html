<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — Moila Trends</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>
<div class="container" style="text-align:center;padding:80px 20px;">
  <div style="font-size:80px;margin-bottom:20px;">🎉</div>
  <div class="hero-badge" style="display:inline-block;margin-bottom:12px;">ORDER CONFIRMED</div>
  <h1 style="font-family:'Playfair Display',serif;font-weight:400;font-size:2.5rem;margin-bottom:12px;">Thank you for your order!</h1>
  <p style="color:var(--text-muted);margin-bottom:28px;">We've received your order and will be in touch shortly.</p>
  <div id="orderBox" style="background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:420px;margin:0 auto 32px;line-height:2;"></div>
  <a href="shop.html"><button class="btn btn-primary">Continue Shopping →</button></a>
</div>
<footer><div class="container"><div class="copyright">© 2026 Moila Trends — A style moment</div></div></footer>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="js/store.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function(){
    var raw = localStorage.getItem('lastOrder');
    var box = document.getElementById('orderBox');
    if (raw) {
      var o = JSON.parse(raw);
      box.innerHTML =
        '<div style="color:var(--text-muted);font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:12px;">Order Details</div>' +
        '<div><strong style="color:var(--accent)">Order #' + o.id + '</strong></div>' +
        '<div>Total: <strong>R' + o.total.toLocaleString() + '</strong></div>' +
        '<div style="color:var(--text-muted);font-size:0.85rem;margin-top:8px;">Confirmation sent to ' + (o.customer && o.customer.email ? o.customer.email : 'your email') + '</div>';
    } else {
      box.innerHTML = '<p style="color:var(--text-muted);">Your order has been placed successfully.</p>';
    }
  });
</script>
</body>
</html>
