<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Moila Trends</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="container">
  <div class="page-header">
    <div class="hero-badge">YOUR MOMENTS</div>
    <h1>Cart</h1>
  </div>
  <div id="cartRoot"></div>
</div>

<footer>
  <div class="container">
    <div class="copyright">© 2026 Moila Trends — A style moment</div>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="js/store.js"></script>
<script>
  var EMOJI_MAP = {
    'shirt':'👕','t-shirt':'👕','hoodie':'🧥','jeans':'👖','denim':'👖',
    'sneaker':'👟','shoe':'👟','boot':'👟',
    'jacket':'🧥','coat':'🧥',
    'earbud':'🎧','headphone':'🎧','watch':'⌚',
    'backpack':'🎒','bag':'👜',
    'sunglass':'🕶️','glass':'🕶️',
    'scarf':'🧣','dress':'👗'
  };

  function getEmoji(name) {
    var n = name.toLowerCase();
    for (var k in EMOJI_MAP) { if (n.includes(k)) return EMOJI_MAP[k]; }
    return '🛍️';
  }

  function fmt(n) { return n.toLocaleString(); }

  function renderCart() {
    var root = document.getElementById('cartRoot');
    var cart = getCart();

    if (cart.length === 0) {
      root.innerHTML =
        '<div class="empty-cart">' +
          '<div class="icon">🛍️</div>' +
          '<h3>Your cart is empty</h3>' +
          '<p>Discover pieces that speak to your style</p>' +
          '<a href="shop.html"><button class="btn btn-primary" style="margin-top:24px;">Explore Collection</button></a>' +
        '</div>';
      return;
    }

    var subtotal = getCartTotal();
    var shipping = subtotal >= 999 ? 0 : 99;
    var total = subtotal + shipping;

    var itemsHtml = cart.map(function(item) {
      var lineTotal = item.price * (item.qty || 1);
      return '<div class="cart-item" id="ci-' + item.name.replace(/[^a-z0-9]/gi,'_') + '">' +
        '<div class="cart-item-icon">' + getEmoji(item.name) + '</div>' +
        '<div class="cart-item-details">' +
          '<div class="cart-item-name">' + item.name + '</div>' +
          '<div class="cart-item-price">R' + fmt(lineTotal) + '</div>' +
          '<div class="cart-item-qty">' +
            '<button class="qty-btn" onclick="cartQty(\'' + item.name.replace(/'/g,"\\'") + '\',-1)">−</button>' +
            '<span class="qty-num">' + (item.qty||1) + '</span>' +
            '<button class="qty-btn" onclick="cartQty(\'' + item.name.replace(/'/g,"\\'") + '\',1)">+</button>' +
            '<span style="color:var(--text-muted);font-size:0.8rem;">× R' + fmt(item.price) + ' each</span>' +
          '</div>' +
        '</div>' +
        '<button class="remove-btn" onclick="cartRemove(\'' + item.name.replace(/'/g,"\\'") + '\')">✕</button>' +
      '</div>';
    }).join('');

    var shippingHtml = shipping === 0
      ? '<span style="color:var(--success)">Free</span>'
      : 'R' + shipping;

    var freeShippingNote = shipping > 0
      ? '<div style="font-size:0.75rem;color:var(--text-muted);margin-top:-6px;padding-bottom:8px;">Add R' + fmt(999 - subtotal) + ' more for free shipping</div>'
      : '';

    root.innerHTML =
      '<div class="cart-layout">' +
        '<div class="cart-items-list">' + itemsHtml + '</div>' +
        '<div class="cart-summary">' +
          '<h3>Order Summary</h3>' +
          '<div class="summary-row"><span>Subtotal</span><span>R' + fmt(subtotal) + '</span></div>' +
          '<div class="summary-row"><span>Shipping</span><span>' + shippingHtml + '</span></div>' +
          freeShippingNote +
          '<div class="summary-row total"><span>Total</span><span>R' + fmt(total) + '</span></div>' +
          '<div class="checkout-section">' +
            '<div style="font-size:0.72rem;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;">Delivery Details</div>' +
            '<input type="text" id="co_name" placeholder="Full Name">' +
            '<input type="email" id="co_email" placeholder="Email Address">' +
            '<input type="text" id="co_address" placeholder="Street Address">' +
            '<input type="text" id="co_city" placeholder="City">' +
            '<button class="checkout-btn" onclick="placeOrder()">Place Order — R' + fmt(total) + '</button>' +
            '<div style="text-align:center;font-size:0.75rem;color:var(--text-muted);">🔒 Secure checkout</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function cartQty(name, delta) {
    changeQty(name, delta);
    renderCart();
  }

  function cartRemove(name) {
    removeFromCart(name);
    renderCart();
  }

  function placeOrder() {
    var name = (document.getElementById('co_name').value || '').trim();
    var email = (document.getElementById('co_email').value || '').trim();
    var address = (document.getElementById('co_address').value || '').trim();
    var city = (document.getElementById('co_city').value || '').trim();

    if (!name || !email || !address || !city) {
      showToast('Please fill in all delivery details', 'error');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showToast('Please enter a valid email address', 'error');
      return;
    }

    var btn = document.querySelector('.checkout-btn');
    btn.disabled = true;
    btn.textContent = 'Processing...';

    setTimeout(function(){
      var order = {
        id: 'MT' + Date.now().toString().slice(-6),
        total: getCartTotal() + (getCartTotal() >= 999 ? 0 : 99),
        items: getCart(),
        customer: { name: name, email: email, address: address, city: city },
        date: new Date().toISOString()
      };
      localStorage.setItem('lastOrder', JSON.stringify(order));
      clearCart();
      window.location.href = 'success.html';
    }, 1200);
  }

  /* Initial render, then re-render on cart changes */
  document.addEventListener('DOMContentLoaded', function(){ renderCart(); });
  /* Poll every 200ms to catch cart badge updates (storage events don't fire same-tab) */
  setInterval(function(){
    var badges = document.querySelectorAll('.cart-badge');
    var count = getCartCount();
    badges.forEach(function(b){ if (b.textContent != count) b.textContent = count; });
  }, 200);
</script>
</body>
</html>
